## IDF Component Manager Manifest File
dependencies:
  ## ESP-Hosted: provides the SDIO transport layer between ESP32-P4 and ESP32-C6
  espressif/esp_hosted:
    version: "^2.0.0"
  ## ESP WiFi Remote: transparent WiFi API delegation to the coprocessor
  espressif/esp_wifi_remote:
    version: "^1.0.0"
  ## LED Strip: addressable LED driver (WS2812B) via RMT peripheral
  espressif/led_strip:
    version: "^3.0.0"
  ## DS18B20: digital temperature sensor (1-Wire) via RMT peripheral
  espressif/ds18b20:
    version: "^0.3.0"
  ## ILI9881C: MIPI DSI LCD panel driver (800×480 / 800×1280)
  espressif/esp_lcd_ili9881c:
    version: "^1.1.0"
  ## ST7701: MIPI DSI LCD panel driver
  espressif/esp_lcd_st7701:
    version: "^2.0.2"
  ## JD9365: MIPI DSI LCD panel driver
  espressif/esp_lcd_jd9365:
    version: "^2.0.2"
  ## GT911: Capacitive touch controller (I2C)
  espressif/esp_lcd_touch_gt911:
    version: "^1.0.0"
  ## LVGL: Graphics library for embedded displays
  lvgl/lvgl:
    version: "^9.0.0"
  idf:
    version: ">=5.5.0"
