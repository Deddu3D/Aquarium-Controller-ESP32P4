## IDF Component Manager Manifest File
dependencies:
  ## ESP-Hosted: provides the SDIO transport layer between ESP32-P4 and ESP32-C6
  espressif/esp_hosted:
    version: "^2.0.0"
  ## ESP WiFi Remote: transparent WiFi API delegation to the coprocessor
  espressif/esp_wifi_remote:
    version: "^1.0.0"
  ## LED Strip: addressable LED driver (WS2812B) via RMT peripheral
  espressif/led_strip:
    version: "^3.0.0"
  ## DS18B20: digital temperature sensor (1-Wire) via RMT peripheral
  espressif/ds18b20:
    version: "^0.3.0"
  ## LVGL: embedded graphics library for the touch display
  lvgl/lvgl:
    version: "^9.2.0"
  ## HX8394 MIPI-DSI panel driver (Waveshare 720×720 round display)
  waveshare/esp_lcd_hx8394:
    version: "^1.0.3"
  ## GT911 capacitive touch controller driver
  espressif/esp_lcd_touch_gt911:
    version: "^1.1.0"
  ## ESP LCD Touch base driver (required by gt911)
  espressif/esp_lcd_touch:
    version: "^1.1.0"
  idf:
    version: ">=5.5.0"
